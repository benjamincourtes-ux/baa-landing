<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rejoins mon équipe</title>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:Arial,sans-serif; background:#f8f3ee; color:#3a3a3a; }
.hero { background:linear-gradient(135deg,#c9a86a,#f5d48a); padding:40px 20px; text-align:center; }
.hero-photo { width:100px; height:100px; border-radius:50%; object-fit:cover; border:4px solid white; box-shadow:0 4px 20px rgba(0,0,0,0.2); margin-bottom:16px; }
.hero h1 { color:#1a0a00; font-size:22px; margin-bottom:6px; }
.hero p { color:rgba(0,0,0,0.65); font-size:14px; line-height:1.6; }
.section { padding:24px 20px; max-width:600px; margin:0 auto; }
.card { background:white; border-radius:16px; padding:20px; margin-bottom:16px; border:1px solid #e8d4b0; }
.card h2 { color:#8b735d; font-size:16px; margin-bottom:14px; }
.sim-label { color:#8b735d; font-size:13px; font-weight:bold; margin-bottom:6px; display:block; }
.sim-slider { width:100%; -webkit-appearance:none; height:6px; border-radius:3px; background:#e8d4b0; outline:none; margin-bottom:4px; }
.sim-slider::-webkit-slider-thumb { -webkit-appearance:none; width:22px; height:22px; border-radius:50%; background:#c9a86a; cursor:pointer; }
.sim-value { color:#c9a86a; font-size:13px; font-weight:bold; text-align:right; margin-bottom:14px; }
.result-box { background:linear-gradient(135deg,#c9a86a,#f5d48a); border-radius:12px; padding:16px; text-align:center; margin-top:8px; }
.result-box p { color:#1a0a00; font-size:13px; margin-bottom:4px; }
.result-box .big { font-size:28px; font-weight:bold; }
.temoignage { background:#f8f3ee; border-radius:12px; padding:14px; margin-bottom:10px; border-left:3px solid #c9a86a; }
.temoignage p { color:#555; font-size:13px; line-height:1.6; font-style:italic; }
.temoignage span { color:#8b735d; font-size:12px; font-weight:bold; display:block; margin-top:6px; }
.form-group { margin-bottom:12px; }
.form-group label { color:#8b735d; font-size:12px; font-weight:bold; display:block; margin-bottom:4px; }
.form-group input, .form-group textarea { width:100%; padding:12px; border:1px solid #e8d4b0; border-radius:10px; font-size:14px; background:white; font-family:Arial,sans-serif; }
.btn-main { width:100%; background:linear-gradient(135deg,#c9a86a,#f5d48a); color:#1a0a00; border:none; padding:16px; border-radius:14px; font-weight:bold; font-size:16px; cursor:pointer; touch-action:manipulation; margin-bottom:10px; }
.btn-secondary { width:100%; background:white; color:#8b735d; border:2px solid #c9a86a; padding:14px; border-radius:14px; font-weight:bold; font-size:14px; cursor:pointer; touch-action:manipulation; text-decoration:none; display:block; text-align:center; }
.avantage { display:flex; align-items:flex-start; gap:12px; margin-bottom:12px; }
.avantage-icon { font-size:22px; flex-shrink:0; }
.avantage-text p { color:#3a3a3a; font-size:14px; line-height:1.5; }
.loading { text-align:center; padding:60px 20px; color:#8b735d; }
.footer { text-align:center; padding:20px; color:#999; font-size:12px; }
</style>
</head>
<body>

<div id="app"><div class="loading">⏳ Chargement...</div></div>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyC94wzVrEtrqxhshdFsRHR7HiL5wJEkYG0",
  authDomain: "beauty-addict-academy.firebaseapp.com",
  projectId: "beauty-addict-academy",
  storageBucket: "beauty-addict-academy.firebasestorage.app",
  messagingSenderId: "311669980538",
  appId: "1:311669980538:web:eaf8a95e987473c6412ac3"
});
var db = firebase.firestore();

function getUid() { return new URLSearchParams(window.location.search).get("uid"); }

var ICONES = ["🤝", "🎓", "🌿", "⏰", "💛"];

function renderPage(t) {
  var uid = getUid();
  var app = document.getElementById("app");
  app.innerHTML = "";

  // HERO
  var hero = document.createElement("div"); hero.className = "hero";
  if (t.photoURL) {
    var img = document.createElement("img"); img.src = t.photoURL; img.className = "hero-photo";
    hero.appendChild(img);
  }
  var h1 = document.createElement("h1");
  h1.textContent = "Rejoins l'équipe de " + (t.prenom || "votre conseillère") + " ! 🌿";
  hero.appendChild(h1);
  var pSub = document.createElement("p");
  pSub.textContent = "Découvre " + (t.societe || "notre activité") + " et développe ton propre business à ton rythme";
  hero.appendChild(pSub);
  app.appendChild(hero);

  var section = document.createElement("div"); section.className = "section";

  // DESCRIPTION PRODUIT/SOCIETE
  if (t.description) {
    var descCard = document.createElement("div"); descCard.className = "card";
    descCard.innerHTML = "<h2>🌟 " + (t.societe || "L'activité") + "</h2><p style='color:#555;font-size:14px;line-height:1.7;'>" + t.description + "</p>";
    section.appendChild(descCard);
  }

  // AVANTAGES
  if (t.avantages) {
    var avCard = document.createElement("div"); avCard.className = "card";
    avCard.innerHTML = "<h2>✨ Ce que tu obtiens</h2>";
    var lignes = t.avantages.split("\n").filter(function(l) { return l.trim(); });
    lignes.forEach(function(ligne, i) {
      var d = document.createElement("div"); d.className = "avantage";
      d.innerHTML = "<span class='avantage-icon'>" + (ICONES[i % ICONES.length]) + "</span><div class='avantage-text'><p>" + ligne + "</p></div>";
      avCard.appendChild(d);
    });
    section.appendChild(avCard);
  }

  // SIMULATEUR
  var simCard = document.createElement("div"); simCard.className = "card";
  simCard.innerHTML = "<h2>💰 Simule tes revenus</h2>";
  var sim = document.createElement("div");

  var caLabel = document.createElement("label"); caLabel.className = "sim-label";
  caLabel.textContent = "Ton chiffre d'affaires mensuel personnel"; sim.appendChild(caLabel);
  var caSlider = document.createElement("input"); caSlider.type = "range"; caSlider.min = "0"; caSlider.max = "5000"; caSlider.value = "500"; caSlider.step = "50"; caSlider.className = "sim-slider";
  sim.appendChild(caSlider);
  var caVal = document.createElement("div"); caVal.className = "sim-value"; caVal.textContent = "500 €"; sim.appendChild(caVal);

  var eqLabel = document.createElement("label"); eqLabel.className = "sim-label";
  eqLabel.textContent = "CA mensuel de ton équipe (si tu en développes une)"; sim.appendChild(eqLabel);
  var eqSlider = document.createElement("input"); eqSlider.type = "range"; eqSlider.min = "0"; eqSlider.max = "10000"; eqSlider.value = "0"; eqSlider.step = "100"; eqSlider.className = "sim-slider";
  sim.appendChild(eqSlider);
  var eqVal = document.createElement("div"); eqVal.className = "sim-value"; eqVal.textContent = "0 €"; sim.appendChild(eqVal);

  var resultBox = document.createElement("div"); resultBox.className = "result-box";
  sim.appendChild(resultBox);

  var commPerso = t.commPerso || 20;
  var commEquipe = t.commEquipe || 5;

  function updateSim() {
    var ca = parseInt(caSlider.value);
    var eq = parseInt(eqSlider.value);
    caVal.textContent = ca.toLocaleString("fr-FR") + " €";
    eqVal.textContent = eq.toLocaleString("fr-FR") + " €";
    var gainPerso = Math.round(ca * commPerso / 100);
    var gainEquipe = Math.round(eq * commEquipe / 100);
    var total = gainPerso + gainEquipe;
    resultBox.innerHTML = "<p>Ton revenu mensuel estimé</p><p class='big'>" + total.toLocaleString("fr-FR") + " €</p><p style='font-size:12px;margin-top:6px;opacity:0.8;'>" + gainPerso + "€ ventes perso (" + commPerso + "%) + " + gainEquipe + "€ équipe (" + commEquipe + "%)</p>";
  }
  caSlider.oninput = updateSim; eqSlider.oninput = updateSim; updateSim();
  simCard.appendChild(sim); section.appendChild(simCard);

  // TEMOIGNAGES
  if (t.temoin1 || t.temoin2) {
    var temCard = document.createElement("div"); temCard.className = "card";
    temCard.innerHTML = "<h2>💬 Elles témoignent</h2>";
    if (t.temoin1) {
      var d1 = document.createElement("div"); d1.className = "temoignage";
      d1.innerHTML = "<p>\"" + t.temoin1 + "\"</p>" + (t.temoin1Nom ? "<span>— " + t.temoin1Nom + "</span>" : "");
      temCard.appendChild(d1);
    }
    if (t.temoin2) {
      var d2 = document.createElement("div"); d2.className = "temoignage";
      d2.innerHTML = "<p>\"" + t.temoin2 + "\"</p>" + (t.temoin2Nom ? "<span>— " + t.temoin2Nom + "</span>" : "");
      temCard.appendChild(d2);
    }
    section.appendChild(temCard);
  }

  // FORMULAIRE CONTACT
  var formCard = document.createElement("div"); formCard.className = "card";
  formCard.innerHTML = "<h2>🚀 Envie d'en savoir plus ?</h2><p style='color:#666;font-size:13px;margin-bottom:16px;line-height:1.5;'>Laisse tes coordonnées et " + (t.prenom || "ta future marraine") + " te recontacte rapidement.</p>";

  var fields = [
    { id: "r-prenom", label: "Prénom *", type: "text" },
    { id: "r-nom", label: "Nom *", type: "text" },
    { id: "r-email", label: "Email *", type: "email" },
    { id: "r-tel", label: "Téléphone", type: "tel" }
  ];
  fields.forEach(function(f) {
    var g = document.createElement("div"); g.className = "form-group";
    g.innerHTML = "<label>" + f.label + "</label><input type='" + f.type + "' id='" + f.id + "' />";
    formCard.appendChild(g);
  });

  var motivGroup = document.createElement("div"); motivGroup.className = "form-group";
  motivGroup.innerHTML = "<label>Qu'est-ce qui t'attire dans cette opportunité ?</label><textarea id='r-motiv' rows='3' style='resize:none;'></textarea>";
  formCard.appendChild(motivGroup);

  var errEl = document.createElement("p"); errEl.style.cssText = "color:#e74c3c;font-size:12px;margin-bottom:8px;display:none;";
  formCard.appendChild(errEl);

  var submitBtn = document.createElement("button"); submitBtn.className = "btn-main";
  submitBtn.textContent = "🌟 Je veux en savoir plus !";
  submitBtn.onclick = function() {
    var prenom = document.getElementById("r-prenom").value.trim();
    var nom = document.getElementById("r-nom").value.trim();
    var email = document.getElementById("r-email").value.trim();
    var tel = document.getElementById("r-tel").value.trim();
    var motiv = document.getElementById("r-motiv").value.trim();
    if (!prenom || !nom || !email) {
      errEl.textContent = "Merci de remplir au moins prénom, nom et email.";
      errEl.style.display = "block";
      return;
    }
    submitBtn.disabled = true; submitBtn.textContent = "⏳ Envoi en cours...";
    db.collection("prospects_recrutement_formations").add({
      prenom: prenom, nom: nom, email: email, tel: tel, motiv: motiv,
      recruteurUid: uid, recruteurPrenom: t.prenom || "", recruteurEmail: t.email || "",
      date: new Date().toISOString(), statut: "nouveau"
    }).then(function() {
      formCard.innerHTML = "<div style='text-align:center;padding:20px 0;'><p style='font-size:50px;margin-bottom:12px;'>🎉</p><h2 style='color:#27AE60;margin-bottom:8px;'>Merci " + prenom + " !</h2><p style='color:#666;font-size:14px;line-height:1.6;'>" + (t.prenom || "Ta contact") + " va te recontacter très vite.</p></div>";
      if (t.lienParrainage) {
        var directBtn = document.createElement("a");
        directBtn.href = t.lienParrainage; directBtn.target = "_blank"; directBtn.className = "btn-secondary";
        directBtn.style.marginTop = "12px";
        directBtn.textContent = "✅ Je m'inscris directement maintenant";
        formCard.appendChild(directBtn);
      }
    }).catch(function() {
      errEl.textContent = "Erreur lors de l'envoi. Réessaie.";
      errEl.style.display = "block";
      submitBtn.disabled = false; submitBtn.textContent = "🌟 Je veux en savoir plus !";
    });
  };
  formCard.appendChild(submitBtn);
  section.appendChild(formCard);

  var footer = document.createElement("div"); footer.className = "footer";
  footer.textContent = "🐦‍🔥 Powered by l'Académie Beauty Addict";
  section.appendChild(footer);

  app.appendChild(section);
}

var uid = getUid();
if (uid) {
  db.collection("acheteurs_formations").doc(uid).get().then(function(snap) {
    var data = snap.data();
    if (data && data.tunnelRecrutement && data.tunnelRecrutement.societe) {
      renderPage(data.tunnelRecrutement);
    } else {
      document.getElementById("app").innerHTML = "<div class='loading'>Ce tunnel n'a pas encore été configuré.</div>";
    }
  }).catch(function() {
    document.getElementById("app").innerHTML = "<div class='loading'>Lien invalide.</div>";
  });
} else {
  document.getElementById("app").innerHTML = "<div class='loading'>Lien invalide.</div>";
}
</script>
</body>
</html>
